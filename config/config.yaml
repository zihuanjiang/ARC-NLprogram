# @package _global_

defaults:
  - experiment: sample
  - solver: default
  - override hydra/job_logging: colorlog
  - override hydra/hydra_logging: colorlog

# Experiment settings
experiment_name: null  # If null, uses the experiment config name (e.g., "sample")
workers: 1

# Solver settings
solver_type: null  # Must be specified: "monolithic", "typed_sequential", or other solver types

# Dataset settings
dataset:
  folder: "./data/arc-prize-2024"
  set: "training"
